name: 🚀 Build All - Flutter + Backend + AI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  flutter:
    name: 📱 Flutter APK
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }
    - uses: subosito/flutter-action@v2
      with: { flutter-version: '3.16.0' }
    
    - name: Move Flutter to root
      run: |
        shopt -s dotglob
        cp -r sehatak_flutter/* .
        cp -r sehatak_flutter/.[!.]* . 2>/dev/null || true
    
    - run: flutter pub get
    
    # ========== بناء APK بحجم أقل ==========
    - name: Build APK (split + obfuscate + tree-shake)
      run: |
        flutter build apk --release \
          --split-per-abi \
          --obfuscate \
          --split-debug-info=build/debug-info \
          --no-tree-shake-icons
    # ========================================
    
    - uses: actions/upload-artifact@v4
      with:
        name: app-arm64-v8a
        path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    
    - uses: actions/upload-artifact@v4
      with:
        name: app-armeabi-v7a
        path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    
    - uses: actions/upload-artifact@v4
      with:
        name: app-x86_64
        path: build/app/outputs/flutter-apk/app-x86_64-release.apk

  ai:
    name: 🧠 AI Service
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ai_service } }
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.11' }
    - run: pip install -r requirements.txt
    - run: python test_service.py

  backend:
    name: 🚀 Backend
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sehatak
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: { node-version: '20' }
    - run: npm install
    - run: echo "✅ Backend ready"
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: sehatak
        DB_USER: test_user
        DB_PASS: test_pass
