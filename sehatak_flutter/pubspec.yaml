name: sehatak
description: A comprehensive healthcare platform for Yemen
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  table_calendar: ^3.0.9
  intl: ^0.18.1
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.3
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2
  permission_handler: ^11.1.0
  flutter_slidable: ^3.0.1
  lottie: ^2.7.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.9
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  http: ^1.2.0
  socket_io_client: ^2.0.3
  agora_rtc_engine: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/placeholder.png
    - assets/icons/placeholder.png
    - assets/icons/svg/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/sehatak_icon.png"
  adaptive_icon_background: "#00796B"
